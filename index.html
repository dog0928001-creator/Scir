<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLOGNOYE - 나의 블로그</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="/" class="text-2xl font-black text-blue-600">BLOGNOYE</a>
            <div class="flex items-center gap-3">
                <a href="/admin/" class="text-sm font-bold px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">글쓰기</a>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-12">
        <h1 class="text-3xl font-bold mb-8">최신 포스트 📝</h1>
        <div id="posts-list" class="space-y-6">
            <div id="status" class="p-10 text-center border-2 border-dashed rounded-xl bg-white text-gray-500">
                <p id="status-text">포스트를 불러오는 중입니다...</p>
            </div>
        </div>
    </main>

    <script>
        // 스크린샷에 표시된 정확한 정보를 입력합니다.
        const CONFIG = {
            username: "dog0928001-creator", // 깃허브 아이디
            repo: "Scir",                   // 저장소 이름 (스크린샷 기준)
            branch: "main",                 
            postsFolder: "content/posts"    
        };

        async function fetchPosts() {
            const list = document.getElementById('posts-list');
            const statusText = document.getElementById('status-text');

            try {
                // GitHub API를 통해 폴더 내용 확인
                const apiUrl = `https://api.github.com/repos/${CONFIG.username}/${CONFIG.repo}/contents/${CONFIG.postsFolder}?ref=${CONFIG.branch}`;
                const response = await fetch(apiUrl);
                
                if (!response.ok) {
                    throw new Error("글이 들어있는 폴더를 찾을 수 없습니다. (먼저 /admin에서 글을 작성해 보세요)");
                }

                const files = await response.json();
                const mdFiles = files.filter(f => f.name.endsWith('.md'));

                if (mdFiles.length === 0) {
                    statusText.innerText = "아직 작성된 글이 없습니다. 관리자 페이지에서 첫 글을 써보세요!";
                    return;
                }

                document.getElementById('status').remove();

                for (const file of mdFiles) {
                    const postData = await fetch(file.download_url).then(res => res.text());
                    
                    // 마크다운 Frontmatter에서 제목 추출 (없으면 파일명 사용)
                    const titleMatch = postData.match(/title:\s*["']?(.*?)["']?$/m);
                    const title = titleMatch ? titleMatch[1] : file.name.replace('.md', '');
                    const dateMatch = postData.match(/date:\s*(.*?)$/m);
                    const date = dateMatch ? dateMatch[1].split('T')[0] : "날짜 미상";
                    
                    const card = document.createElement('div');
                    card.className = "p-6 bg-white rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition cursor-pointer";
                    card.innerHTML = `
                        <div class="text-blue-500 text-xs font-bold mb-1">${date}</div>
                        <h2 class="text-xl font-bold">${title}</h2>
                        <div class="mt-3 text-sm text-gray-400">자세히 보기 →</div>
                    `;
                    card.onclick = () => window.open(file.html_url, '_blank');
                    list.appendChild(card);
                }

            } catch (err) {
                statusText.innerHTML = `<span class="text-red-500">${err.message}</span>`;
            }
        }

        window.onload = fetchPosts;

        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => {
                        document.location.href = "/admin/";
                    });
                }
            });
        }
    </script>
</body>
</html>
