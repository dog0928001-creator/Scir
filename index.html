<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLOGNOYE - 나의 블로그</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <!-- 마크다운을 HTML로 변환해주는 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .prose img { max-width: 100%; border-radius: 0.75rem; }
        .post-card { transition: all 0.2s; }
        .post-card:hover { transform: translateY(-2px); border-color: #3b82f6; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <!-- 상단 바 -->
    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="javascript:showList()" class="text-2xl font-black text-blue-600 tracking-tighter">BLOGNOYE</a>
            <div class="flex items-center gap-4">
                <a href="/admin/" class="text-sm font-bold px-4 py-2 bg-blue-600 text-white rounded-full hover:bg-blue-700 transition">글쓰기</a>
            </div>
        </div>
    </nav>

    <!-- 목록 섹션 -->
    <section id="list-view" class="max-w-4xl mx-auto px-6 py-12">
        <h1 class="text-3xl font-bold mb-8">최신 포스트 🖋️</h1>
        <div id="posts-list" class="grid gap-6">
            <div id="status-box" class="p-20 text-center border-2 border-dashed rounded-3xl bg-white text-gray-400">
                콘텐츠를 불러오는 중입니다...
            </div>
        </div>
    </section>

    <!-- 상세 보기 섹션 (기본은 숨김) -->
    <section id="post-view" class="max-w-3xl mx-auto px-6 py-12 hidden">
        <button onclick="showList()" class="mb-8 text-blue-600 font-bold flex items-center gap-2 hover:underline">
            ← 목록으로 돌아가기
        </button>
        <article class="bg-white p-8 md:p-12 rounded-3xl shadow-sm border border-gray-100">
            <header class="mb-8 pb-8 border-b border-gray-100">
                <span id="view-date" class="text-blue-500 font-bold text-sm tracking-widest uppercase block mb-2"></span>
                <h1 id="view-title" class="text-4xl font-extrabold text-gray-900 leading-tight"></h1>
            </header>
            <div id="view-content" class="prose prose-blue max-w-none leading-relaxed text-gray-700">
                <!-- 마크다운 본문이 들어갈 자리 -->
            </div>
        </article>
    </section>

    <script>
        const CONFIG = {
            username: "dog0928001-creator", 
            repo: "Scir", 
            branch: "main",
            folder: "content/blog"
        };

        // 1. 목록 화면 보여주기
        function showList() {
            document.getElementById('list-view').classList.remove('hidden');
            document.getElementById('post-view').classList.add('hidden');
            window.scrollTo(0, 0);
        }

        // 2. 글 상세 화면 보여주기
        async function showPost(downloadUrl) {
            const listView = document.getElementById('list-view');
            const postView = document.getElementById('post-view');
            const contentArea = document.getElementById('view-content');
            
            listView.classList.add('hidden');
            postView.classList.remove('hidden');
            contentArea.innerHTML = "본문을 불러오는 중...";
            window.scrollTo(0, 0);

            try {
                const response = await fetch(downloadUrl);
                const rawText = await response.text();
                
                // Frontmatter 파싱 (--- 사이의 설정값 제거)
                const parts = rawText.split('---');
                let content = rawText;
                let title = "제목 없음";
                let date = "";

                if (parts.length >= 3) {
                    const yaml = parts[1];
                    content = parts.slice(2).join('---').trim();
                    title = yaml.match(/title:\s*["']?(.*?)["']?$/m)?.[1] || "제목 없음";
                    date = yaml.match(/date:\s*(.*?)$/m)?.[1]?.split('T')[0] || "";
                }

                document.getElementById('view-title').innerText = title;
                document.getElementById('view-date').innerText = date;
                // 마크다운을 HTML로 변환하여 삽입
                contentArea.innerHTML = marked.parse(content);
                
            } catch (err) {
                contentArea.innerHTML = "글을 불러오는 데 실패했습니다.";
            }
        }

        async function loadPosts() {
            const listContainer = document.getElementById('posts-list');
            const statusBox = document.getElementById('status-box');

            try {
                const apiUrl = `https://api.github.com/repos/${CONFIG.username}/${CONFIG.repo}/contents/${CONFIG.folder}?ref=${CONFIG.branch}`;
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error("폴더를 찾을 수 없습니다.");

                const files = await response.json();
                const mdFiles = files.filter(f => f.name.endsWith('.md')).reverse(); // 최신순

                if (mdFiles.length === 0) {
                    statusBox.innerHTML = "작성된 글이 없습니다.";
                    return;
                }

                statusBox.remove();

                for (const file of mdFiles) {
                    const rawData = await fetch(file.download_url).then(r => r.text());
                    const titleMatch = rawData.match(/title:\s*["']?(.*?)["']?$/m);
                    const title = titleMatch ? titleMatch[1] : file.name;
                    const dateMatch = rawData.match(/date:\s*(.*?)$/m);
                    const date = dateMatch ? dateMatch[1].split('T')[0] : "날짜 없음";

                    const card = document.createElement('div');
                    card.className = "post-card bg-white p-6 rounded-2xl shadow-sm border border-gray-100 cursor-pointer";
                    card.innerHTML = `
                        <span class="text-xs font-bold text-blue-500 uppercase">${date}</span>
                        <h2 class="text-xl font-bold mt-1 text-gray-800">${title}</h2>
                        <div class="mt-4 text-sm font-semibold text-blue-600">내용 읽기 →</div>
                    `;
                    // 클릭 시 상세 보기 실행
                    card.onclick = () => showPost(file.download_url);
                    listContainer.appendChild(card);
                }
            } catch (err) {
                statusBox.innerHTML = "오류: " + err.message;
            }
        }

        window.onload = loadPosts;

        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => {
                        document.location.href = "/admin/";
                    });
                }
            });
        }
    </script>
</body>
</html>
