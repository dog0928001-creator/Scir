<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLOGNOYE - 나의 블로그</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        .post-card { transition: all 0.3s ease; }
        .post-card:hover { transform: translateY(-3px); border-color: #3b82f6; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <!-- 상단 네비게이션 -->
    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="/" class="text-2xl font-black text-blue-600 tracking-tighter">BLOGNOYE</a>
            <div class="flex items-center gap-4">
                <a href="/admin/" class="text-sm font-bold px-4 py-2 bg-blue-600 text-white rounded-full hover:bg-blue-700 transition shadow-sm">글쓰기</a>
            </div>
        </div>
    </nav>

    <!-- 메인 레이아웃 -->
    <main class="max-w-4xl mx-auto px-6 py-16">
        <div class="mb-12">
            <h1 class="text-4xl font-bold tracking-tight mb-2">최신 포스트 🖋️</h1>
            <p class="text-gray-500 font-medium">관리자 페이지에서 작성한 글이 자동으로 표시됩니다.</p>
        </div>
        
        <div id="posts-list" class="grid gap-6">
            <!-- 로딩 및 상태 메시지 -->
            <div id="status-box" class="p-20 text-center border-2 border-dashed rounded-3xl bg-white">
                <p id="status-text" class="text-gray-400 font-medium">콘텐츠를 불러오는 중입니다...</p>
            </div>
        </div>
    </main>

    <script>
        // 사용자의 실제 GitHub 정보와 요청하신 폴더 경로(content/blog)를 설정합니다.
        const BLOG_CONFIG = {
            username: "dog0928001-creator", 
            repo: "Scir", 
            branch: "main",
            folder: "content/blog" // 여기서 글을 찾습니다.
        };

        async function initBlog() {
            const listContainer = document.getElementById('posts-list');
            const statusText = document.getElementById('status-text');

            try {
                // GitHub API를 통해 content/blog 폴더의 파일 목록을 가져옵니다.
                const apiUrl = `https://api.github.com/repos/${BLOG_CONFIG.username}/${BLOG_CONFIG.repo}/contents/${BLOG_CONFIG.folder}?ref=${BLOG_CONFIG.branch}`;
                const response = await fetch(apiUrl);

                if (!response.ok) {
                    throw new Error("글이 저장된 폴더(content/blog)를 찾을 수 없습니다. 관리자에서 첫 글을 먼저 작성해 주세요.");
                }

                const files = await response.json();
                const markdownFiles = files.filter(file => file.name.endsWith('.md'));

                if (markdownFiles.length === 0) {
                    statusText.innerText = "아직 작성된 글이 없습니다. 관리자 페이지(/admin)에서 글을 써보세요!";
                    return;
                }

                // 로딩 박스 제거
                document.getElementById('status-box').remove();

                // 각 마크다운 파일의 메타데이터를 파싱하여 카드 생성
                for (const file of markdownFiles) {
                    const rawData = await fetch(file.download_url).then(res => res.text());
                    
                    // Frontmatter 파싱 (제목, 날짜 추출)
                    const titleMatch = rawData.match(/title:\s*["']?(.*?)["']?$/m);
                    const dateMatch = rawData.match(/date:\s*(.*?)$/m);
                    
                    const title = titleMatch ? titleMatch[1] : file.name.replace('.md', '');
                    const date = dateMatch ? dateMatch[1].split('T')[0] : "날짜 없음";

                    const postElement = document.createElement('div');
                    postElement.className = "post-card bg-white p-8 rounded-2xl shadow-sm border border-gray-100 cursor-pointer";
                    postElement.innerHTML = `
                        <div class="flex flex-col gap-2">
                            <span class="text-xs font-bold text-blue-500 tracking-widest uppercase">${date}</span>
                            <h2 class="text-2xl font-bold text-gray-800">${title}</h2>
                            <p class="text-gray-500 text-sm mt-2">클릭하여 GitHub에서 원문을 확인하세요.</p>
                        </div>
                    `;
                    
                    // 클릭 시 해당 파일의 GitHub 주소로 이동
                    postElement.onclick = () => window.open(file.html_url, '_blank');
                    listContainer.appendChild(postElement);
                }

            } catch (err) {
                console.error(err);
                statusText.innerHTML = `<span class="text-red-500 font-bold">오류 발생:</span><br>${err.message}`;
            }
        }

        // 페이지 로드 시 블로그 데이터 로딩 시작
        window.onload = initBlog;

        // Netlify Identity 처리
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => {
                        document.location.href = "/admin/";
                    });
                }
            });
        }
    </script>
</body>
</html>
