<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCRIPTNOYE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* 긴 단어나 URL이 화면을 뚫고 나가지 않도록 설정 */
        .break-words-custom {
            word-break: break-word;
            overflow-wrap: break-word;
            white-space: pre-wrap; /* 마크다운의 줄바꿈을 존중하면서 자동 줄바꿈 적용 */
        }
        
        /* 본문 스타일 가독성 향상 */
        #view-content {
            line-height: 1.8;
            color: #374151;
        }
        #view-content h1, #view-content h2, #view-content h3 {
            margin-top: 2rem;
            margin-bottom: 1rem;
            font-weight: 800;
            color: #111827;
        }
        #view-content p {
            margin-bottom: 1.25rem;
        }
        #view-content img {
            max-width: 100%;
            height: auto;
            border-radius: 1rem;
            margin: 2rem auto;
            display: block;
        }
        .post-card { transition: all 0.2s ease-in-out; }
        .post-card:hover { transform: translateY(-3px); border-color: #3b82f6; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 overflow-x-hidden">

    <!-- 상단 네비게이션 -->
    <nav class="bg-white/80 backdrop-blur-md border-b sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="javascript:showList()" class="text-2xl font-black text-blue-600 tracking-tighter">BLOGNOYE</a>
            <div class="flex items-center gap-4">
                <a href="/admin/" class="text-sm font-bold px-5 py-2.5 bg-blue-600 text-white rounded-full hover:bg-blue-700 transition-all shadow-sm">글쓰기</a>
            </div>
        </div>
    </nav>

    <!-- 목록 섹션 -->
    <section id="list-view" class="max-w-4xl mx-auto px-6 py-12">
        <div class="mb-10">
            <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">최신 포스트 🖋️</h1>
            <p class="text-gray-500 mt-2">당신의 이야기를 들려주세요.</p>
        </div>
        
        <div id="posts-list" class="grid gap-6">
            <!-- 로딩 상태 -->
            <div id="status-box" class="p-20 text-center border-2 border-dashed rounded-3xl bg-white text-gray-400 font-medium">
                게시글을 불러오고 있습니다...
            </div>
        </div>
    </section>

    <!-- 상세 보기 섹션 -->
    <section id="post-view" class="max-w-3xl mx-auto px-6 py-12 hidden">
        <button onclick="showList()" class="mb-10 text-gray-500 font-semibold flex items-center gap-2 hover:text-blue-600 transition-colors group">
            <span class="group-hover:-translate-x-1 transition-transform">←</span> 목록으로 돌아가기
        </button>
        
        <article class="bg-white p-6 md:p-12 rounded-[2.5rem] shadow-sm border border-gray-100">
            <header class="mb-10 pb-10 border-b border-gray-100">
                <span id="view-date" class="text-blue-500 font-bold text-xs tracking-widest uppercase block mb-3"></span>
                <h1 id="view-title" class="text-3xl md:text-5xl font-black text-gray-900 leading-[1.15] break-words-custom"></h1>
            </header>
            
            <!-- 본문 영역: 자동 줄바꿈 강제 적용 -->
            <div id="view-content" class="break-words-custom">
                <!-- 마크다운 변환 본문 -->
            </div>
        </article>
    </section>

    <footer class="max-w-4xl mx-auto px-6 py-12 text-center text-gray-400 text-sm">
        &copy; 2026 SCRIPTNOYE. All rights reserved.
    </footer>

    <script>
        const CONFIG = {
            username: "dog0928001-creator", 
            repo: "Scir", 
            branch: "main",
            folder: "content/blog"
        };

        function showList() {
            document.getElementById('list-view').classList.remove('hidden');
            document.getElementById('post-view').classList.add('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function showPost(downloadUrl) {
            const listView = document.getElementById('list-view');
            const postView = document.getElementById('post-view');
            const contentArea = document.getElementById('view-content');
            
            listView.classList.add('hidden');
            postView.classList.remove('hidden');
            contentArea.innerHTML = `<div class="py-20 text-center text-gray-400">내용을 불러오는 중...</div>`;
            window.scrollTo(0, 0);

            try {
                const response = await fetch(downloadUrl);
                const rawText = await response.text();
                
                // Frontmatter 파싱 로직
                const parts = rawText.split('---');
                let content = rawText;
                let title = "제목 없음";
                let date = "";

                if (parts.length >= 3) {
                    const yaml = parts[1];
                    content = parts.slice(2).join('---').trim();
                    title = yaml.match(/title:\s*["']?(.*?)["']?$/m)?.[1] || "제목 없음";
                    date = yaml.match(/date:\s*(.*?)$/m)?.[1]?.split('T')[0] || "";
                }

                document.getElementById('view-title').innerText = title;
                document.getElementById('view-date').innerText = date;
                
                // 마크다운 변환 및 줄바꿈 최적화 옵션 설정
                marked.setOptions({ gfm: true, breaks: true });
                contentArea.innerHTML = marked.parse(content);
                
            } catch (err) {
                contentArea.innerHTML = `<div class="py-20 text-center text-red-400 font-bold">글을 불러오지 못했습니다. 다시 시도해 주세요.</div>`;
            }
        }

        async function loadPosts() {
            const listContainer = document.getElementById('posts-list');
            const statusBox = document.getElementById('status-box');

            try {
                const apiUrl = `https://api.github.com/repos/${CONFIG.username}/${CONFIG.repo}/contents/${CONFIG.folder}?ref=${CONFIG.branch}`;
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error("폴더를 찾을 수 없습니다.");

                const files = await response.json();
                const mdFiles = files.filter(f => f.name.endsWith('.md')).reverse();

                if (mdFiles.length === 0) {
                    statusBox.innerHTML = "작성된 포스트가 없습니다. 관리자에서 글을 써보세요!";
                    return;
                }

                statusBox.remove();

                for (const file of mdFiles) {
                    const rawData = await fetch(file.download_url).then(r => r.text());
                    const titleMatch = rawData.match(/title:\s*["']?(.*?)["']?$/m);
                    const title = titleMatch ? titleMatch[1] : file.name.replace('.md', '');
                    const dateMatch = rawData.match(/date:\s*(.*?)$/m);
                    const date = dateMatch ? dateMatch[1].split('T')[0] : "날짜 없음";

                    const card = document.createElement('div');
                    card.className = "post-card bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-gray-100 cursor-pointer flex flex-col items-start";
                    card.innerHTML = `
                        <span class="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-2">${date}</span>
                        <h2 class="text-xl md:text-2xl font-bold text-gray-800 leading-tight mb-4 break-words-custom w-full">${title}</h2>
                        <div class="text-sm font-bold text-blue-600 flex items-center gap-1 group-hover:gap-2 transition-all">
                            자세히 보기 <span>→</span>
                        </div>
                    `;
                    card.onclick = () => showPost(file.download_url);
                    listContainer.appendChild(card);
                }
            } catch (err) {
                statusBox.innerHTML = `<span class="text-red-400">오류: ${err.message}</span>`;
            }
        }

        window.onload = loadPosts;

        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => {
                        document.location.href = "/admin/";
                    });
                }
            });
        }
    </script>
</body>
</html>
